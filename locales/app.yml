_version: 2

cli.arg.force.help:
  en: Force update even if cache exists
  zh-CN: 即使存在缓存也强制更新

cli.arg.force.long-help:
  en: |-
    Force update even if a cached subscription configuration exists.
    This will ignore the cache file and fetch the subscription again.
  zh-CN: |-
    即使存在缓存的订阅配置也强制更新。
    此选项会忽略缓存文件并重新下载订阅。

cli.arg.lang.help:
  en: Override language used for CLI messages
  zh-CN: 指定 CLI 使用的语言

cli.arg.merge-strategy.help:
  en: Merge strategy for YAML merging
  zh-CN: YAML 合并策略

cli.arg.merge-strategy.long-help:
  en: |-
    Merge strategy for combining local and remote YAML configurations.
    Available strategies:
    - Keep: preserve scalar values with best effort, recursive merge mappdings.
    - MergeAll: preserve scalar values, append sequences, recursive merge mappings.
    - Force: override local values with remote values (recursive merge).
  zh-CN: |-
    合并本地和远程 YAML 配置的策略。
    可用策略：
    - Keep：尽量保留本地标量值，递归合并映射。
    - MergeAll：保留本地标量值，将远程序列追加到本地，递归合并映射。
    - Force：用远程值覆盖本地值（递归合并）。

cli.arg.path.help:
  en: Path to Mihomo configuration file
  zh-CN: Mihomo 配置文件路径

cli.arg.path.long-help:
  en: |-
    Path to the Mihomo configuration file to update.
    The subscription content will be written into this file.
  zh-CN: |-
    要更新的 Mihomo 配置文件路径。
    订阅内容将写入此文件。

cli.arg.timeout.help:
  en: Network request timeout in seconds
  zh-CN: 网络请求超时时间（秒）

cli.arg.url.help:
  en: Subscription URL
  zh-CN: 订阅地址

cli.arg.user-agent.help:
  en: Custom HTTP User-Agent
  zh-CN: 自定义 HTTP User-Agent

cli.arg.user-agent.long-help:
  en: |-
    Custom HTTP User-Agent used when requesting the subscription.
    Some providers require a specific User-Agent.

  zh-CN: |-
    请求订阅时使用的自定义 HTTP User-Agent。
    某些订阅服务可能要求特定的 User-Agent。

